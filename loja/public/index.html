<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nossos Produtos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="estilo.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f8f6ef;
color:#222;
}

/* HEADER */
header{
background:linear-gradient(90deg,#ffd000,#ffea00);
color:#222;
font-size:28px;
font-weight:700;
text-align:center;
padding:18px;
box-shadow:0 4px 10px rgba(0,0,0,.10);
letter-spacing:1px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
padding:10px;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

/* IMG */
.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
background:#f2f2f2;
}

/* TITLE */
.title{
font-size:14px;
font-weight:600;
margin-top:10px;
line-height:1.35;
height:40px;
overflow:hidden;
color:#222;
}

/* PRICE */
.price{
margin-top:8px;
font-size:22px;
font-weight:700;
color:#c49700;
}

/* BUTTON */
.btn{
display:block;
margin-top:10px;
text-align:center;
text-decoration:none;
background:linear-gradient(90deg,#ffd000,#ffea00);
color:#222;
font-weight:700;
padding:10px;
border-radius:10px;
font-size:15px;
transition:.2s;
}

.btn:hover{
transform:scale(1.03);
}

/* DESKTOP */
@media(min-width:768px){

.grid{
grid-template-columns:repeat(4,1fr);
padding:20px;
gap:20px;
}

.card img{
height:230px;
}

.title{
font-size:16px;
height:48px;
}

header{
font-size:34px;
padding:24px;
}

}

</style>

</head>

<body>

<header>Nossos Produtos</header>

<div class="grid" id="produtos"></div>

<script src="app.js"></script>

</body>
</html>
