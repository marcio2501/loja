<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Nossos Produtos</title>

<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--amarelo1:#ffd000;
--amarelo2:#ffea00;
--texto:#222;
--bg:#f7f7f7;
--card:#fff;
--radius:16px;
--shadow:0 6px 16px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
-webkit-text-size-adjust:100%;
}

body{
font-family:'Poppins',sans-serif;
background:var(--bg);
color:var(--texto);
overflow-x:hidden;
}

/* ======================
HEADER
====================== */
header{
position:sticky;
top:0;
z-index:999;
background:linear-gradient(135deg,var(--amarelo1),var(--amarelo2));
padding:
calc(env(safe-area-inset-top) + 10px)
10px
12px
10px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

header h1{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

/* ======================
BUSCA MOBILE PERFEITA
====================== */
.busca{
display:grid;
grid-template-columns:1fr 95px;
gap:8px;
width:100%;
}

.busca input{
width:100%;
height:44px;
border:none;
outline:none;
border-radius:12px;
padding:0 12px;
font-size:14px;
font-family:'Poppins',sans-serif;
}

.busca button{
width:100%;
height:44px;
border:none;
border-radius:12px;
font-size:14px;
font-weight:700;
background:#222;
color:#fff;
font-family:'Poppins',sans-serif;
}

/* ======================
CONTAINER
====================== */
.container{
padding:10px;
max-width:1400px;
margin:auto;
}

/* ======================
STATUS
====================== */
.status{
padding:20px;
text-align:center;
font-weight:600;
}

/* ======================
GRID MOBILE
2 por linha fixo
====================== */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* ======================
CARD
====================== */
.card{
background:var(--card);
border-radius:var(--radius);
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
min-width:0;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
background:#eee;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.3;
height:34px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:7px;
font-size:18px;
font-weight:700;
color:#b88900;
}

.btn{
margin-top:8px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
border-radius:10px;
font-size:13px;
font-weight:700;
background:linear-gradient(135deg,var(--amarelo1),var(--amarelo2));
color:#222;
}

/* ======================
TABLET
====================== */
@media(min-width:768px){

header h1{
font-size:28px;
}

.busca{
grid-template-columns:1fr 130px;
max-width:650px;
margin:auto;
}

.grid{
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.title{
font-size:14px;
height:40px;
}

.price{
font-size:20px;
}

}

/* ======================
PC
====================== */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.container{
padding:18px;
}

}

/* ======================
PC GRANDE
====================== */
@media(min-width:1400px){

.grid{
grid-template-columns:repeat(5,1fr);
}

}

</style>

</head>

<body>

<header>

<h1>Nossos Produtos</h1>

<div class="busca">

<input
type="search"
id="buscar"
placeholder="Buscar Exu, vela, guia..."
enterkeyhint="search">

<button onclick="buscarProduto()">
Buscar
</button>

</div>

</header>

<main class="container">

<div id="produtos" class="status">
Carregando produtos...
</div>

</main>

<script>

async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.className = "status";
box.innerHTML = "Carregando produtos...";

try{

const r = await fetch(url,{cache:"no-store"});
const data = await r.json();

if(
!data ||
!data.data ||
!data.data.productOfferV2 ||
!data.data.productOfferV2.nodes
){
box.innerHTML = "Nenhum produto encontrado.";
return;
}

let produtos = data.data.productOfferV2.nodes;

/* força múltiplo de 2 no celular */
if(window.innerWidth < 768){

if(produtos.length % 2 !== 0){
produtos = produtos.slice(0, produtos.length - 1);
}

}

/* máximo 24 */
produtos = produtos.slice(0,24);

let html = '<div class="grid">';

produtos.forEach(p=>{

const nome = p.productName || "Produto";
const img = p.imageUrl || "";
const preco = Number(p.price || 0).toFixed(2);
const link = p.offerLink || "#";

html += `
<div class="card">

<div class="img-wrap">
<img
loading="lazy"
src="${img}"
alt="${nome}"
onerror="this.src='https://via.placeholder.com/400?text=Produto'">
</div>

<div class="title">${nome}</div>

<div class="price">R$ ${preco}</div>

<a
class="btn"
href="${link}"
target="_blank"
rel="noopener noreferrer">
Comprar
</a>

</div>
`;

});

html += '</div>';

box.className = "";
box.innerHTML = html;

}catch(e){

box.innerHTML = "Erro ao carregar produtos.";

}

}

function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(termo === ""){
carregarProdutos("/produtos");
return;
}

carregarProdutos("/buscar/" + encodeURIComponent(termo));

}

document
.getElementById("buscar")
.addEventListener("keydown",function(e){

if(e.key === "Enter"){
e.preventDefault();
buscarProduto();
}

});

carregarProdutos();

</script>

</body>
</html>
