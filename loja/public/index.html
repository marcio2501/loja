<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Nossos Produtos</title>

<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--amarelo1:#ffd000;
--amarelo2:#ffea00;
--texto:#1f1f1f;
--bg:#f7f7f7;
--card:#ffffff;
--sombra:0 8px 20px rgba(0,0,0,.08);
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
-webkit-text-size-adjust:100%;
}

body{
font-family:'Poppins',sans-serif;
background:var(--bg);
color:var(--texto);
min-height:100vh;
padding-bottom:25px;
overflow-x:hidden;
}

/* =========================
HEADER APP STYLE
========================= */
header{
position:sticky;
top:0;
z-index:999;
background:linear-gradient(135deg,var(--amarelo1),var(--amarelo2));
padding:
calc(env(safe-area-inset-top) + 14px)
14px
14px
14px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.topo{
max-width:1200px;
margin:auto;
}

header h1{
font-size:24px;
font-weight:700;
text-align:center;
margin-bottom:12px;
letter-spacing:.3px;
}

/* =========================
BUSCA
========================= */
.busca{
display:flex;
gap:8px;
align-items:center;
}

.busca input{
flex:1;
height:48px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:15px;
font-family:'Poppins',sans-serif;
box-shadow:0 4px 10px rgba(0,0,0,.06);
appearance:none;
-webkit-appearance:none;
}

.busca button{
height:48px;
border:none;
padding:0 18px;
border-radius:14px;
font-size:14px;
font-weight:700;
font-family:'Poppins',sans-serif;
background:#222;
color:#fff;
cursor:pointer;
white-space:nowrap;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

/* =========================
CONTAINER
========================= */
.container{
max-width:1280px;
margin:auto;
padding:14px;
}

/* =========================
STATUS
========================= */
.status{
padding:18px;
text-align:center;
font-size:15px;
font-weight:600;
color:#555;
}

/* =========================
GRID
========================= */
.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

/* =========================
CARD
========================= */
.card{
background:var(--card);
border-radius:var(--radius);
padding:10px;
box-shadow:var(--sombra);
overflow:hidden;
display:flex;
flex-direction:column;
min-width:0;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
background:#f0f0f0;
border-radius:14px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:10px;
font-size:13px;
font-weight:600;
line-height:1.35;
min-height:38px;
max-height:38px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
word-break:break-word;
}

.price{
margin-top:8px;
font-size:20px;
font-weight:700;
color:#b88900;
line-height:1;
}

.btn{
margin-top:10px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
border-radius:12px;
font-size:14px;
font-weight:700;
background:linear-gradient(135deg,var(--amarelo1),var(--amarelo2));
color:#222;
}

/* =========================
TABLET
========================= */
@media (min-width:768px){

header h1{
font-size:30px;
}

.container{
padding:18px;
}

.grid{
grid-template-columns:repeat(3,minmax(0,1fr));
gap:18px;
}

.title{
font-size:14px;
min-height:42px;
max-height:42px;
}

.price{
font-size:22px;
}

}

/* =========================
PC
========================= */
@media (min-width:1100px){

.grid{
grid-template-columns:repeat(5,minmax(0,1fr));
gap:20px;
}

header h1{
font-size:34px;
}

.busca{
max-width:720px;
margin:auto;
}

}

/* =========================
ANIMAÇÃO LEVE
========================= */
.card{
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<header>
<div class="topo">

<h1>Nossos Produtos</h1>

<div class="busca">
<input
type="search"
id="buscar"
placeholder="Buscar Exu, vela, guia..."
enterkeyhint="search">

<button onclick="buscarProduto()">
Buscar
</button>
</div>

</div>
</header>

<main class="container">
<div id="produtos" class="status">Carregando produtos...</div>
</main>

<script>

async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.className = "status";
box.innerHTML = "Carregando produtos...";

try{

const r = await fetch(url,{cache:"no-store"});
const data = await r.json();

if(
!data ||
!data.data ||
!data.data.productOfferV2 ||
!data.data.productOfferV2.nodes ||
data.data.productOfferV2.nodes.length === 0
){
box.className = "status";
box.innerHTML = "Nenhum produto encontrado.";
return;
}

const produtos = data.data.productOfferV2.nodes;

let html = '<div class="grid">';

produtos.forEach(p=>{

const nome = p.productName || "Produto";
const img = p.imageUrl || "";
const preco = Number(p.price || 0).toFixed(2);
const link = p.offerLink || "#";

html += `
<div class="card">

<div class="img-wrap">
<img
loading="lazy"
src="${img}"
alt="${nome}"
onerror="this.src='https://via.placeholder.com/400?text=Produto'">
</div>

<div class="title">${nome}</div>

<div class="price">R$ ${preco}</div>

<a
class="btn"
href="${link}"
target="_blank"
rel="noopener noreferrer">
Comprar
</a>

</div>
`;

});

html += '</div>';

box.className = "";
box.innerHTML = html;

}catch(e){

box.className = "status";
box.innerHTML = "Erro ao carregar produtos.";

}

}

/* =========================
BUSCA
========================= */
function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(termo === ""){
carregarProdutos("/produtos");
return;
}

carregarProdutos("/buscar/" + encodeURIComponent(termo));

}

/* ENTER */
document
.getElementById("buscar")
.addEventListener("keydown",function(e){

if(e.key === "Enter"){
e.preventDefault();
buscarProduto();
}

});

/* START */
carregarProdutos();

</script>

</body>
</html>
