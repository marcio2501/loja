<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Shopee da Umbanda</title>

<meta name="theme-color" content="#f6c400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--amarelo:#f6c400;
--amarelo2:#ffd82a;
--texto:#222;
--card:#fff;
--radius:16px;
--shadow:0 8px 20px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
-webkit-text-size-adjust:100%;
}

body{
font-family:'Poppins',sans-serif;
background:#f6c400;
color:#222;
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
background:#f6c400;
padding:
calc(env(safe-area-inset-top) + 8px)
10px
10px
10px;
box-shadow:0 2px 8px rgba(0,0,0,.04);
}

/* SUAVE APP */
header.mini{
padding:
calc(env(safe-area-inset-top) + 6px)
10px
8px
10px;
}

.logo-link{
display:flex;
justify-content:center;
text-decoration:none;
margin-bottom:10px;
}

.logo{
width:100%;
max-width:430px;
height:auto;
display:block;
transition:max-width .18s ease;
}

header.mini .logo-link{
justify-content:flex-start;
margin-bottom:8px;
}

header.mini .logo{
max-width:185px;
}

/* BUSCA */
.top-search{
display:grid;
grid-template-columns:minmax(0,1fr) 88px;
gap:8px;
max-width:760px;
margin:auto;
width:100%;
}

.busca-input{
width:100%;
min-width:0;
height:44px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
font-family:'Poppins',sans-serif;
box-shadow:var(--shadow);
}

.buscar-btn{
width:100%;
height:44px;
border:none;
border-radius:14px;
font-weight:700;
font-size:14px;
background:#222;
color:#fff;
cursor:pointer;
}

/* CONTAINER */
.container{
max-width:1500px;
margin:auto;
padding:10px;
}

/* STATUS */
.status{
padding:28px;
text-align:center;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
cursor:pointer;
min-width:0;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
background:#f0f0f0;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.3;
height:36px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:8px;
font-size:18px;
font-weight:700;
color:#b88900;
}

.btn{
margin-top:8px;
height:40px;
border:none;
border-radius:10px;
font-size:13px;
font-weight:700;
background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));
color:#222;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:9999;
padding:14px;
overflow:auto;
}

.modal-box{
background:#fff;
max-width:520px;
margin:20px auto;
border-radius:18px;
padding:14px;
box-shadow:var(--shadow);
}

.modal-img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
background:#f2f2f2;
}

.modal-title{
margin-top:12px;
font-size:18px;
font-weight:700;
line-height:1.35;
}

.modal-price{
margin-top:8px;
font-size:24px;
font-weight:700;
color:#b88900;
}

.modal-desc{
margin-top:8px;
font-size:14px;
line-height:1.5;
color:#555;
}

.modal-btn,
.fechar-btn{
width:100%;
height:46px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:700;
margin-top:12px;
cursor:pointer;
}

.modal-btn{
background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));
color:#222;
}

.fechar-btn{
background:#222;
color:#fff;
}

/* TABLET */
@media(min-width:768px){

.top-search{
grid-template-columns:minmax(0,1fr) 110px;
}

.grid{
grid-template-columns:repeat(3,minmax(0,1fr));
gap:14px;
}

.logo{
max-width:500px;
}

.title{
font-size:14px;
height:40px;
}

.price{
font-size:20px;
}

}

/* PC */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(4,minmax(0,1fr));
gap:18px;
}

.logo{
max-width:560px;
}

.container{
padding:18px;
}

}

/* PC GRANDE */
@media(min-width:1400px){

.grid{
grid-template-columns:repeat(5,minmax(0,1fr));
}

}

</style>
</head>

<body>

<header id="topo">

<a href="/" class="logo-link">
<img
class="logo"
src="https://i.ibb.co/23wWNK1W/Chat-GPT-Image-24-04-2026-18-09-06.png"
alt="Shopee da Umbanda">
</a>

<div class="top-search">

<input
type="search"
id="buscar"
class="busca-input"
placeholder="Buscar Exu, vela, guia..."
enterkeyhint="search">

<button class="buscar-btn" onclick="buscarProduto()">
Buscar
</button>

</div>

</header>

<main class="container">
<div id="produtos" class="status">
Carregando produtos...
</div>
</main>

<!-- MODAL -->
<div class="modal" id="modalProduto">
<div class="modal-box">

<img id="mImg" class="modal-img">

<div id="mTitulo" class="modal-title"></div>

<div id="mPreco" class="modal-price"></div>

<div class="modal-desc">
Produto selecionado da vitrine oficial Shopee da Umbanda.
</div>

<button class="modal-btn" id="mComprar">
Comprar
</button>

<button class="fechar-btn" onclick="fecharModal()">
Fechar
</button>

</div>
</div>

<script>

function moeda(v){
return Number(v || 0).toFixed(2);
}

/* PRODUTOS */
async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.className = "status";
box.innerHTML = "Carregando produtos...";

try{

const r = await fetch(url,{cache:"no-store"});
const data = await r.json();

if(!data?.data?.productOfferV2?.nodes){
box.innerHTML = "Nenhum produto encontrado.";
return;
}

let produtos = data.data.productOfferV2.nodes.slice(0,24);

let html = '<div class="grid">';

produtos.forEach(p=>{

const nome = (p.productName || "Produto")
.replace(/'/g,"");

const img = p.imageUrl || "";
const preco = moeda(p.price);
const link = p.offerLink || "#";

html += `
<div class="card"
onclick="abrirModal('${nome}','${img}','${preco}','${link}')">

<div class="img-wrap">
<img
src="${img}"
loading="lazy"
onerror="this.src='https://via.placeholder.com/400?text=Produto'">
</div>

<div class="title">${nome}</div>

<div class="price">R$ ${preco}</div>

<button
class="btn"
onclick="event.stopPropagation();window.open('${link}','_blank')">
Comprar
</button>

</div>
`;

});

html += "</div>";

box.className = "";
box.innerHTML = html;

}catch(e){

box.innerHTML = "Erro ao carregar produtos.";

}

}

/* MODAL */
function abrirModal(nome,img,preco,link){

document.getElementById("mImg").src = img;
document.getElementById("mTitulo").innerText = nome;
document.getElementById("mPreco").innerText = "R$ " + preco;

document.getElementById("mComprar").onclick = ()=>{
window.open(link,"_blank");
};

document.getElementById("modalProduto").style.display="block";

}

function fecharModal(){
document.getElementById("modalProduto").style.display="none";
}

/* BUSCA */
function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(!termo){
carregarProdutos("/produtos");
return;
}

carregarProdutos(
"/buscar/" + encodeURIComponent(termo)
);

}

document.getElementById("buscar")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){
buscarProduto();
}

});

/* HEADER SUAVE */
let ultimoEstado = false;

window.addEventListener("scroll",()=>{

const mini = window.scrollY > 55;

if(mini !== ultimoEstado){

document
.getElementById("topo")
.classList.toggle("mini",mini);

ultimoEstado = mini;

}

},{passive:true});

/* FECHAR MODAL FORA */
document.getElementById("modalProduto")
.addEventListener("click",function(e){

if(e.target.id==="modalProduto"){
fecharModal();
}

});

/* START */
carregarProdutos();

</script>

</body>
</html>
