<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nossos Produtos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f8f6ef;
color:#222;
}

header{
background:linear-gradient(90deg,#ffd000,#ffea00);
padding:18px;
box-shadow:0 4px 10px rgba(0,0,0,.10);
text-align:center;
}

header h1{
font-size:28px;
margin-bottom:12px;
}

.busca{
display:flex;
gap:8px;
}

.busca input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

.busca button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#222;
color:#fff;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#fff;
border-radius:16px;
padding:10px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

.title{
font-size:14px;
font-weight:600;
height:40px;
overflow:hidden;
margin-top:10px;
}

.price{
font-size:22px;
font-weight:700;
color:#c49700;
margin-top:8px;
}

.btn{
display:block;
margin-top:10px;
padding:10px;
text-align:center;
text-decoration:none;
background:linear-gradient(90deg,#ffd000,#ffea00);
color:#222;
font-weight:700;
border-radius:10px;
}

@media(min-width:768px){

.grid{
grid-template-columns:repeat(4,1fr);
padding:20px;
gap:20px;
}

.card img{
height:220px;
}

}

</style>

</head>

<body>

<header>

<h1>Nossos Produtos</h1>

<div class="busca">

<input
type="text"
id="buscar"
placeholder="Buscar Exu, vela, guia...">

<button onclick="buscarProduto()">
Buscar
</button>

</div>

</header>

<div class="grid" id="produtos"></div>

<script>

async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.innerHTML =
"<h2 style='padding:20px'>Carregando...</h2>";

try{

const r = await fetch(url);
const data = await r.json();

if(
!data ||
!data.data ||
!data.data.productOfferV2 ||
!data.data.productOfferV2.nodes
){
box.innerHTML =
"<h2 style='padding:20px'>Nenhum produto encontrado.</h2>";
return;
}

const produtos =
data.data.productOfferV2.nodes;

let html = "";

produtos.forEach(p=>{

html += `
<div class="card">
<img src="${p.imageUrl}">
<div class="title">${p.productName}</div>
<div class="price">R$ ${Number(p.price).toFixed(2)}</div>
<a class="btn" href="${p.offerLink}" target="_blank">
Comprar
</a>
</div>
`;

});

box.innerHTML = html;

}catch(e){

box.innerHTML =
"<h2 style='padding:20px'>Erro ao carregar.</h2>";

}

}

function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(termo==""){
carregarProdutos("/produtos");
return;
}

carregarProdutos("/buscar/" + encodeURIComponent(termo));

}

document
.getElementById("buscar")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
buscarProduto();
}

});

carregarProdutos();

</script>

</body>
</html>
