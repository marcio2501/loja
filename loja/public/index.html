<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Shopee da Umbanda</title>

<meta name="theme-color" content="#f6c400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--amarelo:#f6c400;
--amarelo2:#ffd82a;
--texto:#222;
--card:#ffffff;
--radius:16px;
--shadow:0 6px 18px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
-webkit-text-size-adjust:100%;
}

body{
font-family:'Poppins',sans-serif;
background:var(--amarelo);
color:var(--texto);
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
background:var(--amarelo);
padding:
calc(env(safe-area-inset-top) + 8px)
10px
12px
10px;
}

/* LOGO */
.logo-link{
display:flex;
justify-content:center;
margin-bottom:10px;
text-decoration:none;
}

.logo{
width:100%;
max-width:420px;
height:auto;
display:block;
}

/* BUSCA + CARRINHO */
.top-search{
display:grid;
grid-template-columns:1fr 48px;
gap:8px;
max-width:900px;
margin:auto;
align-items:center;
}

.busca-input{
width:100%;
height:46px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
font-family:'Poppins',sans-serif;
box-shadow:var(--shadow);
}

/* CARRINHO */
.cart-btn{
height:46px;
border:none;
border-radius:14px;
background:#fff;
position:relative;
box-shadow:var(--shadow);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.cart-icon{
font-size:22px;
line-height:1;
}

.badge{
position:absolute;
top:-6px;
right:-4px;
min-width:20px;
height:20px;
padding:0 5px;
border-radius:20px;
background:#ee4d2d;
color:#fff;
font-size:11px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

/* CONTAINER */
.container{
max-width:1500px;
margin:auto;
padding:10px;
}

/* STATUS */
.status{
padding:25px;
text-align:center;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
min-width:0;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
border-radius:12px;
overflow:hidden;
background:#f0f0f0;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.3;
height:36px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:8px;
font-size:18px;
font-weight:700;
color:#b88900;
}

.btn{
margin-top:8px;
height:38px;
border:none;
border-radius:10px;
font-size:13px;
font-weight:700;
background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));
color:#222;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:9999;
}

.modal-box{
position:absolute;
left:0;
right:0;
bottom:0;
background:#fff;
border-radius:20px 20px 0 0;
padding:16px;
max-height:80vh;
overflow:auto;
}

.item-cart{
display:flex;
gap:10px;
padding:10px 0;
border-bottom:1px solid #eee;
}

.item-cart img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.finalizar,
.fechar{
width:100%;
height:46px;
border:none;
border-radius:12px;
font-weight:700;
font-size:14px;
margin-top:10px;
cursor:pointer;
}

.finalizar{
background:#ee4d2d;
color:#fff;
}

.fechar{
background:#222;
color:#fff;
}

/* TABLET */
@media(min-width:768px){

.top-search{
grid-template-columns:1fr 54px;
max-width:720px;
}

.grid{
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.title{
font-size:14px;
height:40px;
}

.price{
font-size:20px;
}

.logo{
max-width:500px;
}

}

/* PC */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.container{
padding:18px;
}

.logo{
max-width:560px;
}

}

/* PC GRANDE */
@media(min-width:1400px){

.grid{
grid-template-columns:repeat(5,1fr);
}

}

</style>
</head>

<body>

<header>

<a href="/" class="logo-link">
<img
class="logo"
src="https://i.ibb.co/23wWNK1W/Chat-GPT-Image-24-04-2026-18-09-06.png"
alt="Shopee da Umbanda">
</a>

<div class="top-search">

<input
type="search"
id="buscar"
class="busca-input"
placeholder="Buscar Exu, vela, guia..."
enterkeyhint="search">

<button class="cart-btn" onclick="abrirCarrinho()">
<span class="cart-icon">🛒</span>
<span class="badge" id="qtdCarrinho">0</span>
</button>

</div>

</header>

<main class="container">
<div id="produtos" class="status">Carregando produtos...</div>
</main>

<!-- MODAL -->
<div class="modal" id="modalCarrinho">
<div class="modal-box">

<h2 style="margin-bottom:10px">Seu Carrinho</h2>

<div id="listaCarrinho"></div>

<button class="finalizar" onclick="finalizarCompra()">
Finalizar Compra na Shopee
</button>

<button class="fechar" onclick="fecharCarrinho()">
Fechar
</button>

</div>
</div>

<script>

let carrinho =
JSON.parse(localStorage.getItem("carrinhoShopee")) || [];

/* PRODUTOS */
async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.className = "status";
box.innerHTML = "Carregando produtos...";

try{

const r = await fetch(url,{cache:"no-store"});
const data = await r.json();

if(!data?.data?.productOfferV2?.nodes){
box.innerHTML = "Nenhum produto encontrado.";
return;
}

let produtos =
data.data.productOfferV2.nodes.slice(0,24);

let html = '<div class="grid">';

produtos.forEach(p=>{

html += `
<div class="card">

<div class="img-wrap">
<img src="${p.imageUrl}" loading="lazy">
</div>

<div class="title">${p.productName}</div>

<div class="price">
R$ ${Number(p.price).toFixed(2)}
</div>

<button class="btn"
onclick='adicionarCarrinho(${JSON.stringify(p)})'>
Adicionar
</button>

</div>
`;

});

html += "</div>";

box.className = "";
box.innerHTML = html;

}catch(e){

box.innerHTML = "Erro ao carregar.";

}

}

/* BUSCAR */
function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(!termo){
carregarProdutos("/produtos");
return;
}

carregarProdutos(
"/buscar/" + encodeURIComponent(termo)
);

}

/* ENTER */
document.getElementById("buscar")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){
buscarProduto();
}

});

/* CARRINHO */
function atualizarCarrinho(){

document.getElementById("qtdCarrinho")
.innerText = carrinho.length;

}

function adicionarCarrinho(produto){

carrinho.push(produto);

localStorage.setItem(
"carrinhoShopee",
JSON.stringify(carrinho)
);

atualizarCarrinho();

}

function abrirCarrinho(){

const box =
document.getElementById("listaCarrinho");

if(carrinho.length===0){

box.innerHTML = "<p>Carrinho vazio.</p>";

}else{

let html = "";

carrinho.forEach((p,i)=>{

html += `
<div class="item-cart">

<img src="${p.imageUrl}">

<div style="flex:1">

<div style="font-size:13px;font-weight:600">
${p.productName}
</div>

<div style="margin-top:6px;font-weight:700;color:#b88900">
R$ ${Number(p.price).toFixed(2)}
</div>

<button
onclick="removerItem(${i})"
style="margin-top:6px;border:none;background:red;color:#fff;padding:6px 10px;border-radius:8px">
Remover
</button>

</div>
</div>
`;

});

box.innerHTML = html;

}

document.getElementById("modalCarrinho")
.style.display="block";

}

function fecharCarrinho(){

document.getElementById("modalCarrinho")
.style.display="none";

}

function removerItem(i){

carrinho.splice(i,1);

localStorage.setItem(
"carrinhoShopee",
JSON.stringify(carrinho)
);

atualizarCarrinho();
abrirCarrinho();

}

/* FINALIZAR */
function finalizarCompra(){

if(carrinho.length===0){
alert("Carrinho vazio");
return;
}

window.open(carrinho[0].offerLink,"_blank");

for(let i=1;i<carrinho.length;i++){

setTimeout(()=>{
window.open(carrinho[i].offerLink,"_blank");
},i*600);

}

}

/* START */
atualizarCarrinho();
carregarProdutos();

</script>

</body>
</html>
