<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Shopee da Umbanda</title>

<meta name="theme-color" content="#f6c400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--amarelo:#f6c400;
--amarelo2:#ffd82a;
--texto:#222;
--card:#ffffff;
--radius:16px;
--shadow:0 6px 18px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:#f6c400;
color:var(--texto);
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
background:#f6c400;
padding:
calc(env(safe-area-inset-top) + 8px)
10px
10px
10px;
transition:.25s;
box-shadow:0 4px 10px rgba(0,0,0,.05);
}

/* HEADER COMPACTO AO ROLAR */
header.mini{
padding:
calc(env(safe-area-inset-top) + 5px)
10px
8px
10px;
}

header.mini .logo{
max-width:170px;
margin:0;
}

header.mini .logo-link{
justify-content:flex-start;
margin-bottom:8px;
}

/* LOGO */
.logo-link{
display:flex;
justify-content:center;
text-decoration:none;
margin-bottom:10px;
}

.logo{
width:100%;
max-width:430px;
height:auto;
display:block;
transition:.25s;
}

/* BUSCA */
.top-search{
display:grid;
grid-template-columns:1fr 95px;
gap:8px;
max-width:700px;
margin:auto;
}

.busca-input{
height:44px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
font-family:'Poppins',sans-serif;
box-shadow:var(--shadow);
width:100%;
}

.buscar-btn{
height:44px;
border:none;
border-radius:14px;
font-weight:700;
font-size:14px;
background:#222;
color:#fff;
cursor:pointer;
}

/* CONTAINER */
.container{
max-width:1500px;
margin:auto;
padding:10px;
}

/* STATUS */
.status{
padding:30px;
text-align:center;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
background:#f0f0f0;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.3;
height:36px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:8px;
font-size:18px;
font-weight:700;
color:#b88900;
}

.btn{
margin-top:8px;
height:40px;
border:none;
border-radius:10px;
font-size:13px;
font-weight:700;
background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));
color:#222;
cursor:pointer;
}

/* TABLET */
@media(min-width:768px){

.grid{
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.logo{
max-width:500px;
}

.top-search{
grid-template-columns:1fr 120px;
}

.title{
font-size:14px;
height:40px;
}

.price{
font-size:20px;
}

}

/* PC */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.logo{
max-width:560px;
}

.container{
padding:18px;
}

}

/* PC GRANDE */
@media(min-width:1400px){

.grid{
grid-template-columns:repeat(5,1fr);
}

}

</style>
</head>

<body>

<header id="topo">

<a href="/" class="logo-link">
<img
class="logo"
src="https://i.ibb.co/23wWNK1W/Chat-GPT-Image-24-04-2026-18-09-06.png"
alt="Shopee da Umbanda">
</a>

<div class="top-search">

<input
type="search"
id="buscar"
class="busca-input"
placeholder="Buscar Exu, vela, guia..."
enterkeyhint="search">

<button class="buscar-btn" onclick="buscarProduto()">
Buscar
</button>

</div>

</header>

<main class="container">
<div id="produtos" class="status">
Carregando produtos...
</div>
</main>

<script>

/* PRODUTOS */
async function carregarProdutos(url="/produtos"){

const box = document.getElementById("produtos");

box.className = "status";
box.innerHTML = "Carregando produtos...";

try{

const r = await fetch(url,{cache:"no-store"});
const data = await r.json();

if(!data?.data?.productOfferV2?.nodes){
box.innerHTML = "Nenhum produto encontrado.";
return;
}

let produtos = data.data.productOfferV2.nodes.slice(0,24);

let html = '<div class="grid">';

produtos.forEach(p=>{

const nome = p.productName || "Produto";
const img = p.imageUrl || "";
const preco = Number(p.price || 0).toFixed(2);
const link = p.offerLink || "#";

html += `
<div class="card">

<div class="img-wrap">
<img
src="${img}"
loading="lazy"
onerror="this.src='https://via.placeholder.com/400?text=Produto'">
</div>

<div class="title">${nome}</div>

<div class="price">
R$ ${preco}
</div>

<button
class="btn"
onclick="window.open('${link}','_blank')">
Comprar
</button>

</div>
`;

});

html += "</div>";

box.className = "";
box.innerHTML = html;

}catch(e){

box.innerHTML = "Erro ao carregar produtos.";

}

}

/* BUSCA */
function buscarProduto(){

const termo =
document.getElementById("buscar").value.trim();

if(!termo){
carregarProdutos("/produtos");
return;
}

carregarProdutos(
"/buscar/" + encodeURIComponent(termo)
);

}

document.getElementById("buscar")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){
buscarProduto();
}

});

/* HEADER DIMINUI */
window.addEventListener("scroll",()=>{

const topo =
document.getElementById("topo");

if(window.scrollY > 60){
topo.classList.add("mini");
}else{
topo.classList.remove("mini");
}

});

/* START */
carregarProdutos();

</script>

</body>
</html>
