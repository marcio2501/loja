<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Axé Shop</title>

<meta name="theme-color" content="#d7b26d">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f3eee4;
--bg2:#ece1ce;
--gold:#c89d47;
--gold2:#e4bf77;
--dark:#2c261f;
--muted:#756e66;
--shadow:0 10px 24px rgba(0,0,0,.07);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--dark);
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
background:rgba(243,238,228,.94);
padding:12px;
}

.logo{
display:block;
margin:auto;
max-height:140px;
cursor:pointer;
}

.top-search{
display:grid;
grid-template-columns:1fr 100px;
gap:8px;
margin-top:10px;
}

input{
height:46px;
border:none;
border-radius:14px;
padding:0 12px;
}

button{
border:none;
border-radius:14px;
background:var(--gold);
color:#fff;
font-weight:700;
cursor:pointer;
}

/* GRID */
.container{padding:14px;}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#fff;
border-radius:16px;
padding:8px;
box-shadow:var(--shadow);
}

.img-wrap{
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
font-size:13px;
margin-top:6px;
height:36px;
overflow:hidden;
}

.price{
color:var(--gold);
font-weight:700;
}

.btn{
margin-top:6px;
height:36px;
width:100%;
}

/* STATUS */
.status{
text-align:center;
padding:30px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
}

.modal-box{
background:#fff;
max-width:400px;
margin:30px auto;
padding:10px;
border-radius:14px;
}

.modal-img{width:100%;border-radius:10px;}

</style>
</head>

<body>

<header>
<img class="logo"
src="https://i.ibb.co/fzH4Tk85/Chat-GPT-Image-24-04-2026-20-19-44.png"
onclick="voltarInicio()">

<div class="top-search">
<input id="buscar" placeholder="Buscar...">
<button onclick="buscarProduto()">Buscar</button>
</div>
</header>

<main class="container">
<div id="produtos" class="status">Carregando produtos...</div>
</main>

<!-- MODAL -->
<div class="modal" id="modalProduto">
<div class="modal-box">
<img id="mImg" class="modal-img">
<div id="mTitulo"></div>
<div id="mPreco"></div>
<button id="mComprar">Comprar</button>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script>

/* AUTO RELOAD */
(function(){
const url=new URL(location.href);
if(!url.searchParams.get("r")){
url.searchParams.set("r","1");
location.replace(url);
}
})();

const box=document.getElementById("produtos");
const inputBusca=document.getElementById("buscar");

let todosProdutos=[];

function moeda(v){return Number(v||0).toFixed(2);}
function limpar(t){return String(t||"").replace(/[<>"']/g,"");}
function urlNova(u){return u+(u.includes("?")?"&":"?")+"t="+Date.now();}

/* CARD */
function cardHTML(p){
return `
<div class="card">
<div class="img-wrap" onclick="abrirModal('${limpar(p.productName)}','${p.imageUrl}','${moeda(p.price)}','${p.offerLink}')">
<img src="${p.imageUrl}">
</div>
<div class="title">${limpar(p.productName)}</div>
<div class="price">R$ ${moeda(p.price)}</div>
<button class="btn" onclick="window.open('${p.offerLink}','_blank')">Comprar</button>
</div>`;
}

/* RENDER */
function render(lista){

if(!lista.length){
box.innerHTML="<div class='status'>Nenhum produto encontrado.</div>";
return;
}

box.innerHTML=`
<div class="grid">
${lista.map(cardHTML).join("")}
</div>
`;

}

/* LOAD */
async function carregarProdutos(url){

box.innerHTML="Carregando...";

try{
const r=await fetch(url);

if(!r.ok) throw new Error();

const data=await r.json();

const lista=data?.data?.productOfferV2?.nodes||[];

todosProdutos=lista;

render(lista);

}catch(e){
box.innerHTML="<div class='status'>Erro ao carregar.</div>";
}
}

/* 🔥 CORREÇÃO REAL */
function buscarProduto(){

const termo=inputBusca.value.trim();

if(!termo){
carregarProdutos(urlNova("/produtos"));
return;
}

/* compatível com seu server.js */
carregarProdutos(
urlNova("/buscar/"+encodeURIComponent(termo))
);

}

/* ENTER */
inputBusca.addEventListener("keydown",e=>{
if(e.key==="Enter") buscarProduto();
});

/* MODAL */
function abrirModal(n,i,p,l){
mImg.src=i;
mTitulo.innerText=n;
mPreco.innerText="R$ "+p;
mComprar.onclick=()=>window.open(l);
modalProduto.style.display="block";
}

function fecharModal(){
modalProduto.style.display="none";
}

/* INICIO */
function voltarInicio(){
carregarProdutos(urlNova("/produtos"));
window.scrollTo({top:0});
}

/* START */
carregarProdutos(urlNova("/produtos"));

</script>

</body>
</html>
