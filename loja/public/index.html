<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Axé Shop</title>

<meta name="theme-color" content="#d7b26d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Axé Shop">
<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo192.png">
<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f3eee4;
--bg2:#ece1ce;
--gold:#c89d47;
--gold2:#e4bf77;
--dark:#2c261f;
--muted:#756e66;
--shadow:0 10px 24px rgba(0,0,0,.07);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
-webkit-text-size-adjust:100%;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--dark);
overflow-x:hidden;
}

header{
position:sticky;
top:0;
z-index:999;
background:rgba(243,238,228,.94);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-bottom:1px solid rgba(0,0,0,.03);
padding:calc(env(safe-area-inset-top) + 10px) 12px 8px;
transition:.28s ease;
}

.header-wrap{
max-width:1500px;
margin:auto;
}

.brand-row{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:10px;
transition:.28s ease;
}

.logo-btn{
border:none;
background:none;
padding:0;
cursor:pointer;
width:100%;
display:flex;
justify-content:center;
}

.logo{
display:block;
max-width:min(100%,860px);
max-height:170px;
width:auto;
height:auto;
margin:auto;
border-radius:18px;
transition:.28s ease;
}

.top-search{
display:grid;
grid-template-columns:minmax(0,1fr) 96px;
gap:8px;
max-width:780px;
margin:auto;
}

.busca-input{
height:46px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
background:#fff;
box-shadow:var(--shadow);
font-family:'Poppins',sans-serif;
}

.buscar-btn{
height:46px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,var(--gold),var(--gold2));
color:var(--dark);
box-shadow:var(--shadow);
font-family:'Poppins',sans-serif;
}

header.mini .brand-row{
justify-content:flex-start;
margin-bottom:8px;
}

header.mini .logo-btn{
justify-content:flex-start;
}

header.mini .logo{
max-width:220px;
max-height:52px;
margin:0;
border-radius:12px;
}

.container{
max-width:1500px;
margin:auto;
padding:14px;
}

.status{
padding:28px;
text-align:center;
font-weight:600;
color:var(--muted);
}

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

.card{
background:rgba(255,255,255,.97);
border-radius:18px;
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
cursor:pointer;
}

.img-wrap{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:14px;
background:#f2f2f2;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.35;
height:38px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:8px;
font-size:19px;
font-weight:700;
color:var(--gold);
}

.btn{
margin-top:8px;
height:40px;
border:none;
border-radius:12px;
font-size:13px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,var(--gold),var(--gold2));
font-family:'Poppins',sans-serif;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:9999;
padding:14px;
overflow:auto;
}

.modal-box{
background:#fff;
max-width:520px;
margin:20px auto;
border-radius:20px;
padding:14px;
}

.modal-img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
}

.modal-title{
margin-top:12px;
font-size:18px;
font-weight:700;
}

.modal-price{
margin-top:8px;
font-size:24px;
font-weight:700;
color:var(--gold);
}

.modal-btn,
.fechar-btn{
width:100%;
height:46px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:700;
cursor:pointer;
font-family:'Poppins',sans-serif;
}

.modal-btn{
background:linear-gradient(135deg,var(--gold),var(--gold2));
}

.fechar-btn{
background:#222;
color:#fff;
}

footer{
margin-top:28px;
padding:18px 16px 28px;
background:rgba(255,255,255,.35);
}

.footer-mini{
font-size:12px;
line-height:1.8;
text-align:center;
color:var(--muted);
}

.footer-copy{
margin-top:10px;
font-size:11px;
font-weight:600;
text-align:center;
}

@media(min-width:768px){
.grid{grid-template-columns:repeat(3,minmax(0,1fr));}
.top-search{grid-template-columns:minmax(0,1fr) 110px;}
}

@media(min-width:1100px){
.grid{grid-template-columns:repeat(4,minmax(0,1fr));}
}

@media(min-width:1400px){
.grid{grid-template-columns:repeat(5,minmax(0,1fr));}
}
</style>
</head>

<body>

<header id="topo">
<div class="header-wrap">

<div class="brand-row">
<button class="logo-btn" type="button" onclick="voltarInicio()">
<img class="logo"
src="https://i.ibb.co/fzH4Tk85/Chat-GPT-Image-24-04-2026-20-19-44.png"
alt="Axé Shop">
</button>
</div>

<div class="top-search">
<input type="search" id="buscar" class="busca-input" placeholder="Buscar vela, guia, erva..." enterkeyhint="search">
<button class="buscar-btn" onclick="buscarProduto()">Buscar</button>
</div>

</div>
</header>

<main class="container">
<div id="produtos" class="status">Carregando produtos...</div>
</main>

<div class="modal" id="modalProduto">
<div class="modal-box">
<img id="mImg" class="modal-img">
<div id="mTitulo" class="modal-title"></div>
<div id="mPreco" class="modal-price"></div>
<button class="modal-btn" id="mComprar">Comprar</button>
<button class="fechar-btn" onclick="fecharModal()">Fechar</button>
</div>
</div>

<footer>
<div class="footer-mini">
<p>Axé Shop é uma vitrine digital independente.</p>
<p>Pagamento e entrega são responsabilidade da loja de destino.</p>
<p>Alguns links podem gerar comissão de afiliado.</p>
</div>

<div class="footer-copy">© 2026 Axé Shop</div>
</footer>

<script>
function moeda(v){
return Number(v || 0).toFixed(2);
}

/* FUNCIONA NO NAVEGADOR E NO APP PWA */

function voltarInicio(){

document.getElementById("buscar").value = "";

/* fecha modal se estiver aberto */
fecharModal();

/* recarrega home */
carregarProdutos("/produtos");

/* remove rota de busca no app */
if(location.pathname !== "/"){
history.replaceState({}, "", "/");
}

/* sobe tela */
window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* PRODUTOS */

async function carregarProdutos(url="/produtos"){

const box=document.getElementById("produtos");

box.className="status";
box.innerHTML="Carregando produtos...";

try{

const r=await fetch(url,{cache:"no-store"});
const data=await r.json();

if(!data?.data?.productOfferV2?.nodes){
box.innerHTML="Nenhum produto encontrado.";
return;
}

let produtos=data.data.productOfferV2.nodes.slice(0,48);

let html='<div class="grid">';

produtos.forEach(p=>{

const nome=(p.productName || "Produto").replace(/'/g,"");
const img=p.imageUrl || "";
const preco=moeda(p.price);
const link=p.offerLink || "#";

html+=`
<div class="card" onclick="abrirModal('${nome}','${img}','${preco}','${link}')">

<div class="img-wrap">
<img src="${img}" loading="lazy">
</div>

<div class="title">${nome}</div>
<div class="price">R$ ${preco}</div>

<button class="btn"
onclick="event.stopPropagation();window.open('${link}','_blank')">
Comprar
</button>

</div>
`;

});

html+='</div>';

box.className="";
box.innerHTML=html;

}catch(e){
box.innerHTML="Erro ao carregar produtos.";
}

}

function buscarProduto(){

const termo=document.getElementById("buscar").value.trim();

if(!termo){
voltarInicio();
return;
}

history.replaceState({}, "", "/");

carregarProdutos("/buscar/" + encodeURIComponent(termo));

}

document.getElementById("buscar").addEventListener("keydown",function(e){
if(e.key==="Enter") buscarProduto();
});

/* MODAL */

function abrirModal(nome,img,preco,link){

document.getElementById("mImg").src=img;
document.getElementById("mTitulo").innerText=nome;
document.getElementById("mPreco").innerText="R$ " + preco;

document.getElementById("mComprar").onclick=()=>{
window.open(link,"_blank");
};

document.getElementById("modalProduto").style.display="block";
}

function fecharModal(){
document.getElementById("modalProduto").style.display="none";
}

document.getElementById("modalProduto").addEventListener("click",function(e){
if(e.target.id==="modalProduto") fecharModal();
});

/* HEADER MINI */

let ativo=false;

window.addEventListener("scroll",function(){

const mini=window.scrollY>70;

if(mini!==ativo){
document.getElementById("topo").classList.toggle("mini",mini);
ativo=mini;
}

},{passive:true});

/* START */

carregarProdutos();
</script>

</body>
</html>
