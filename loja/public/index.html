<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Axé Shop</title>

<meta name="theme-color" content="#d7b26d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Axé Shop">
<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo192.png">
<link rel="icon" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f3eee4;
--bg2:#ece1ce;
--gold:#c89d47;
--gold2:#e4bf77;
--dark:#2c261f;
--muted:#756e66;
--shadow:0 10px 24px rgba(0,0,0,.07);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
-webkit-text-size-adjust:100%;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--dark);
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
background:rgba(243,238,228,.94);
backdrop-filter:blur(12px);
padding:12px;
border-bottom:1px solid rgba(0,0,0,.04);
}

.logo{
display:block;
margin:auto;
max-width:100%;
max-height:160px;
border-radius:18px;
cursor:pointer;
}

.top-search{
display:grid;
grid-template-columns:1fr 100px;
gap:8px;
max-width:780px;
margin:12px auto 0;
}

input{
height:46px;
border:none;
outline:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
font-family:Poppins,sans-serif;
box-shadow:var(--shadow);
}

button{
border:none;
cursor:pointer;
font-family:Poppins,sans-serif;
}

.buscar-btn,.btn,.modal-btn,.pwa-btn{
background:linear-gradient(135deg,var(--gold),var(--gold2));
font-weight:700;
}

.buscar-btn{
height:46px;
border-radius:14px;
}

.container{
max-width:1500px;
margin:auto;
padding:14px;
}

.status{
padding:30px;
text-align:center;
font-weight:600;
color:var(--muted);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

.card{
background:#fff;
border-radius:18px;
padding:8px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
contain:content;
}

.img-wrap{
aspect-ratio:1/1;
overflow:hidden;
border-radius:14px;
background:#f2f2f2;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
margin-top:8px;
font-size:13px;
font-weight:600;
line-height:1.35;
height:38px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.price{
margin-top:8px;
font-size:19px;
font-weight:700;
color:var(--gold);
}

.btn{
margin-top:8px;
height:40px;
border-radius:12px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:9999;
padding:14px;
overflow:auto;
}

.modal-box{
background:#fff;
max-width:520px;
margin:20px auto;
border-radius:20px;
padding:14px;
}

.modal-img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
}

.modal-title{
margin-top:12px;
font-size:18px;
font-weight:700;
}

.modal-price{
margin-top:8px;
font-size:24px;
font-weight:700;
color:var(--gold);
}

.modal-btn,.fechar-btn{
width:100%;
height:46px;
border-radius:12px;
margin-top:12px;
font-weight:700;
}

.fechar-btn{
background:#222;
color:#fff;
}

/* PWA */
#pwaPopup{
position:fixed;
inset:0;
display:none;
background:rgba(0,0,0,.55);
z-index:10000;
align-items:center;
justify-content:center;
padding:18px;
}

.pwa-box{
width:100%;
max-width:420px;
background:#fff;
border-radius:22px;
padding:22px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.18);
}

.pwa-logo{
width:72px;
height:72px;
border-radius:18px;
display:block;
margin:auto auto 14px;
}

.pwa-title{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.pwa-text{
font-size:14px;
color:#666;
line-height:1.6;
margin-bottom:12px;
}

.pwa-steps{
background:#f8f4ea;
padding:14px;
border-radius:14px;
font-size:14px;
line-height:1.8;
text-align:left;
}

.pwa-btn,.pwa-close{
width:100%;
height:46px;
border-radius:14px;
margin-top:10px;
font-weight:700;
}

.pwa-close{
background:#222;
color:#fff;
}

/* FOOTER */
footer{
margin-top:26px;
padding:20px;
text-align:center;
font-size:12px;
color:var(--muted);
}

footer b{
display:block;
margin-top:10px;
color:#000;
}

@media(min-width:768px){
.grid{grid-template-columns:repeat(3,minmax(0,1fr));}
}
@media(min-width:1100px){
.grid{grid-template-columns:repeat(4,minmax(0,1fr));}
}
@media(min-width:1400px){
.grid{grid-template-columns:repeat(5,minmax(0,1fr));}
}
</style>
</head>

<body>

<header>
<img class="logo"
src="https://i.ibb.co/fzH4Tk85/Chat-GPT-Image-24-04-2026-20-19-44.png"
onclick="voltarInicio()">

<div class="top-search">
<input type="search" id="buscar" placeholder="Buscar vela, guia, erva...">
<button class="buscar-btn" onclick="buscarProduto()">Buscar</button>
</div>
</header>

<main class="container">
<div id="produtos" class="status">Carregando produtos...</div>
</main>

<!-- MODAL -->
<div class="modal" id="modalProduto">
<div class="modal-box">
<img id="mImg" class="modal-img">
<div id="mTitulo" class="modal-title"></div>
<div id="mPreco" class="modal-price"></div>
<button class="modal-btn" id="mComprar">Comprar</button>
<button class="fechar-btn" onclick="fecharModal()">Fechar</button>
</div>
</div>

<!-- PWA -->
<div id="pwaPopup">
<div class="pwa-box">
<img src="logo192.png" class="pwa-logo">
<div class="pwa-title">Instalar Axé Shop</div>
<div class="pwa-text">Tenha acesso rápido como aplicativo.</div>
<div class="pwa-steps" id="pwaSteps"></div>
<button class="pwa-btn" id="pwaBtn">Instalar Agora</button>
<button class="pwa-close" onclick="fecharPWA()">Agora não</button>
</div>
</div>

<footer>
<p>Axé Shop é uma vitrine digital independente.</p>
<p>Pagamento e entrega são responsabilidade da loja de destino.</p>
<p>Alguns links podem gerar comissão de afiliado.</p>
<b>© 2026 Axé Shop</b>
</footer>

<script>

/* AUTO RELOAD */
(function(){
const url=new URL(location.href);
if(!url.searchParams.get("r")){
url.searchParams.set("r","1");
location.replace(url);
}
})();

/* VOLTAR INICIO */
function voltarInicio(){
window.scrollTo({top:0,behavior:"smooth"});
carregarProdutos(urlNova("/produtos"));
}

/* TODO SEU JS ORIGINAL (sem remover nada) */
const box=document.getElementById("produtos");
const inputBusca=document.getElementById("buscar");

let todosProdutos=[];
let pagina=0;
let porPagina=20;
let carregando=false;
let cache={};
let deferredPrompt=null;

function moeda(v){return Number(v||0).toFixed(2);}
function limpar(t){return String(t||"").replace(/[<>"']/g,"");}
function urlNova(u){return u+(u.includes("?")?"&":"?")+"t="+Date.now();}

function cardHTML(p){
return `<div class="card">
<div class="img-wrap" onclick="abrirModal('${limpar(p.productName)}','${p.imageUrl}','${moeda(p.price)}','${p.offerLink}')">
<img src="${p.imageUrl}">
</div>
<div class="title">${p.productName}</div>
<div class="price">R$ ${moeda(p.price)}</div>
<button class="btn" onclick="window.open('${p.offerLink}','_blank')">Comprar</button>
</div>`;
}

function renderBase(){
box.innerHTML=`<div class="grid" id="gridProdutos"></div>`;
}

function renderMais(){
if(carregando)return;
carregando=true;
const grid=document.getElementById("gridProdutos");
const ini=pagina*porPagina;
const lote=todosProdutos.slice(ini,ini+porPagina);
if(!lote.length){carregando=false;return;}
grid.insertAdjacentHTML("beforeend",lote.map(cardHTML).join(""));
pagina++;
carregando=false;
}

async function carregarProdutos(url){
box.innerHTML="Carregando produtos...";
pagina=0;
try{
const r=await fetch(url,{cache:"no-store"});
const data=await r.json();
todosProdutos=data?.data?.productOfferV2?.nodes||[];
renderBase();
renderMais();
}catch{
box.innerHTML="Erro ao carregar produtos.";
}
}

function buscarProduto(){
const termo=inputBusca.value.trim();
carregarProdutos(urlNova(termo?"/buscar/"+encodeURIComponent(termo):"/produtos"));
window.scrollTo({top:0});
}

inputBusca.addEventListener("keydown",e=>{
if(e.key==="Enter")buscarProduto();
});

function abrirModal(n,i,p,l){
mImg.src=i;
mTitulo.innerText=n;
mPreco.innerText="R$ "+p;
mComprar.onclick=()=>window.open(l);
modalProduto.style.display="block";
}

function fecharModal(){
modalProduto.style.display="none";
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

carregarProdutos(urlNova("/produtos"));

</script>

</body>
</html>
